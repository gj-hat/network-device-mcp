# ============================================================
# 网络设备只读命令封闭集合
# 参考 ntc-templates (https://github.com/networktocode/ntc-templates)
# 格式：每条命令 = id + name + description + command [+ params]
# ============================================================

# ── Cisco IOS / IOS-XE ───────────────────────────────────────
cisco:
  # --- 系统信息 ---
  - id: show_version
    name: "查看系统版本"
    description: "显示设备型号、IOS 版本、运行时间等基础信息"
    command: "show version"

  - id: show_inventory
    name: "查看硬件清单"
    description: "显示设备模块、SN 序列号、PID 等硬件信息"
    command: "show inventory"

  - id: show_module
    name: "查看模块状态"
    description: "显示各模块在线状态和型号"
    command: "show module"

  - id: show_redundancy
    name: "查看冗余状态"
    description: "显示 SSO/HA 冗余引擎状态"
    command: "show redundancy"

  - id: show_boot
    name: "查看启动配置"
    description: "显示系统引导变量"
    command: "show boot"

  - id: show_clock
    name: "查看系统时间"
    description: "显示设备当前时间"
    command: "show clock"

  # --- 性能与资源 ---
  - id: show_processes_cpu
    name: "查看 CPU 利用率"
    description: "显示 CPU 总体和各进程使用率"
    command: "show processes cpu"

  - id: show_processes_memory
    name: "查看内存使用"
    description: "显示内存总量、已用、空闲"
    command: "show processes memory"

  - id: show_environment
    name: "查看环境状态"
    description: "显示温度、电源、风扇状态"
    command: "show environment all"

  - id: show_platform_resources
    name: "查看平台资源"
    description: "显示 TCAM、FIB 等硬件资源使用情况"
    command: "show platform resources"

  # --- 接口 ---
  - id: show_ip_interface_brief
    name: "查看接口 IP 摘要"
    description: "显示所有接口 IP 地址和状态摘要"
    command: "show ip interface brief"

  - id: show_interfaces_status
    name: "查看接口状态"
    description: "显示所有接口状态、速率、双工、VLAN"
    command: "show interfaces status"

  - id: show_interface_detail
    name: "查看指定接口详情"
    description: "显示指定接口的详细计数器和状态"
    command: "show interfaces {interface}"
    params:
      - name: interface
        type: string
        description: "接口名称，如 GigabitEthernet0/1"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  - id: show_interfaces_description
    name: "查看接口描述"
    description: "显示所有接口描述信息"
    command: "show interfaces description"

  - id: show_interfaces_trunk
    name: "查看 Trunk 接口"
    description: "显示所有 Trunk 接口及其允许的 VLAN"
    command: "show interfaces trunk"

  - id: show_interfaces_switchport
    name: "查看交换端口信息"
    description: "显示指定接口的交换端口配置"
    command: "show interfaces {interface} switchport"
    params:
      - name: interface
        type: string
        description: "接口名称"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  - id: show_interfaces_counters
    name: "查看接口计数器"
    description: "显示接口错误和流量计数"
    command: "show interfaces counters"

  - id: show_interfaces_transceiver
    name: "查看光模块信息"
    description: "显示光模块型号和光功率"
    command: "show interfaces transceiver"

  # --- 二层 ---
  - id: show_vlan
    name: "查看 VLAN"
    description: "显示所有 VLAN 及其成员端口"
    command: "show vlan"

  - id: show_vlan_id
    name: "查看指定 VLAN"
    description: "显示指定 VLAN 的详细信息"
    command: "show vlan id {vlan_id}"
    params:
      - name: vlan_id
        type: integer
        description: "VLAN ID"
        min: 1
        max: 4094

  - id: show_mac_address_table
    name: "查看 MAC 地址表"
    description: "显示全部 MAC 地址表"
    command: "show mac address-table"

  - id: show_mac_address_table_interface
    name: "查看接口 MAC 表"
    description: "显示指定接口学到的 MAC 地址"
    command: "show mac address-table interface {interface}"
    params:
      - name: interface
        type: string
        description: "接口名称"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  - id: show_spanning_tree
    name: "查看生成树"
    description: "显示 STP 状态和根桥信息"
    command: "show spanning-tree"

  - id: show_spanning_tree_vlan
    name: "查看 VLAN 生成树"
    description: "显示指定 VLAN 的 STP 信息"
    command: "show spanning-tree vlan {vlan_id}"
    params:
      - name: vlan_id
        type: integer
        description: "VLAN ID"
        min: 1
        max: 4094

  - id: show_etherchannel_summary
    name: "查看端口聚合"
    description: "显示 EtherChannel/Port-channel 汇总信息"
    command: "show etherchannel summary"

  - id: show_etherchannel_detail
    name: "查看端口聚合详情"
    description: "显示 EtherChannel 详细信息"
    command: "show etherchannel detail"

  # --- 三层 / 路由 ---
  - id: show_ip_route
    name: "查看 IP 路由表"
    description: "显示完整 IPv4 路由表"
    command: "show ip route"

  - id: show_ip_route_network
    name: "查看指定路由"
    description: "查看到指定网络的路由详情"
    command: "show ip route {network}"
    params:
      - name: network
        type: ip_address
        description: "目标 IP 地址或网络"

  - id: show_ip_route_summary
    name: "查看路由表摘要"
    description: "显示各协议路由条数统计"
    command: "show ip route summary"

  - id: show_ip_arp
    name: "查看 ARP 表"
    description: "显示 ARP 缓存"
    command: "show ip arp"

  - id: show_ip_arp_ip
    name: "查看指定 IP 的 ARP"
    description: "查看指定 IP 地址的 ARP 条目"
    command: "show ip arp {ip_address}"
    params:
      - name: ip_address
        type: ip_address
        description: "目标 IP 地址"

  # --- 路由协议 ---
  - id: show_ip_ospf
    name: "查看 OSPF 进程"
    description: "显示 OSPF 进程概览"
    command: "show ip ospf"

  - id: show_ip_ospf_neighbor
    name: "查看 OSPF 邻居"
    description: "显示 OSPF 邻居关系"
    command: "show ip ospf neighbor"

  - id: show_ip_ospf_interface_brief
    name: "查看 OSPF 接口摘要"
    description: "显示 OSPF 接口摘要"
    command: "show ip ospf interface brief"

  - id: show_ip_ospf_database
    name: "查看 OSPF LSDB"
    description: "显示 OSPF 链路状态数据库"
    command: "show ip ospf database"

  - id: show_ip_bgp_summary
    name: "查看 BGP 摘要"
    description: "显示 BGP 邻居和路由统计"
    command: "show ip bgp summary"

  - id: show_ip_bgp
    name: "查看 BGP 路由表"
    description: "显示 BGP 路由表"
    command: "show ip bgp"

  - id: show_ip_bgp_neighbors
    name: "查看 BGP 邻居"
    description: "显示 BGP 邻居详细信息"
    command: "show ip bgp neighbors"

  - id: show_ip_eigrp_neighbors
    name: "查看 EIGRP 邻居"
    description: "显示 EIGRP 邻居"
    command: "show ip eigrp neighbors"

  - id: show_ip_eigrp_topology
    name: "查看 EIGRP 拓扑"
    description: "显示 EIGRP 拓扑表"
    command: "show ip eigrp topology"

  # --- 邻居发现 ---
  - id: show_cdp_neighbors
    name: "查看 CDP 邻居"
    description: "显示 CDP 邻居摘要"
    command: "show cdp neighbors"

  - id: show_cdp_neighbors_detail
    name: "查看 CDP 邻居详情"
    description: "显示 CDP 邻居详细信息（含管理 IP）"
    command: "show cdp neighbors detail"

  - id: show_lldp_neighbors
    name: "查看 LLDP 邻居"
    description: "显示 LLDP 邻居摘要"
    command: "show lldp neighbors"

  - id: show_lldp_neighbors_detail
    name: "查看 LLDP 邻居详情"
    description: "显示 LLDP 邻居详细信息"
    command: "show lldp neighbors detail"

  # --- 安全 / ACL ---
  - id: show_access_lists
    name: "查看 ACL"
    description: "显示所有访问控制列表"
    command: "show access-lists"

  - id: show_ip_access_lists
    name: "查看 IP ACL"
    description: "显示 IP 访问控制列表"
    command: "show ip access-lists"

  # --- DHCP ---
  - id: show_ip_dhcp_binding
    name: "查看 DHCP 绑定"
    description: "显示 DHCP 地址分配情况"
    command: "show ip dhcp binding"

  - id: show_ip_dhcp_pool
    name: "查看 DHCP 地址池"
    description: "显示 DHCP 地址池统计"
    command: "show ip dhcp pool"

  # --- MPLS ---
  - id: show_mpls_forwarding_table
    name: "查看 MPLS 转发表"
    description: "显示 MPLS 标签转发表"
    command: "show mpls forwarding-table"

  - id: show_mpls_ldp_neighbor
    name: "查看 MPLS LDP 邻居"
    description: "显示 MPLS LDP 邻居"
    command: "show mpls ldp neighbor"

  - id: show_mpls_interfaces
    name: "查看 MPLS 接口"
    description: "显示启用 MPLS 的接口"
    command: "show mpls interfaces"

  # --- HSRP / VRRP ---
  - id: show_standby
    name: "查看 HSRP 状态"
    description: "显示 HSRP 虚拟网关状态"
    command: "show standby"

  - id: show_standby_brief
    name: "查看 HSRP 摘要"
    description: "显示 HSRP 状态摘要"
    command: "show standby brief"

  - id: show_vrrp
    name: "查看 VRRP 状态"
    description: "显示 VRRP 虚拟路由器状态"
    command: "show vrrp"

  - id: show_vrrp_brief
    name: "查看 VRRP 摘要"
    description: "显示 VRRP 状态摘要"
    command: "show vrrp brief"

  # --- NTP / SNMP ---
  - id: show_ntp_status
    name: "查看 NTP 状态"
    description: "显示 NTP 同步状态"
    command: "show ntp status"

  - id: show_ntp_associations
    name: "查看 NTP 关联"
    description: "显示 NTP 服务器关联"
    command: "show ntp associations"

  - id: show_snmp_community
    name: "查看 SNMP 社区"
    description: "显示 SNMP 社区字符串配置"
    command: "show snmp community"

  # --- 配置查看（只读）---
  - id: show_running_config
    name: "查看运行配置"
    description: "显示当前运行配置（只读查看）"
    command: "show running-config"

  - id: show_startup_config
    name: "查看启动配置"
    description: "显示保存的启动配置"
    command: "show startup-config"

  - id: show_running_interface
    name: "查看接口配置"
    description: "显示指定接口的运行配置"
    command: "show running-config interface {interface}"
    params:
      - name: interface
        type: string
        description: "接口名称"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  # --- 诊断 ---
  - id: ping_ip
    name: "Ping 测试"
    description: "Ping 指定 IP 地址"
    command: "ping {ip_address}"
    params:
      - name: ip_address
        type: ip_address
        description: "目标 IP 地址"

  - id: traceroute_ip
    name: "路由追踪"
    description: "追踪到目标 IP 的路由路径"
    command: "traceroute {ip_address}"
    params:
      - name: ip_address
        type: ip_address
        description: "目标 IP 地址"

  - id: show_logging
    name: "查看日志"
    description: "显示设备日志缓冲区"
    command: "show logging"

  - id: show_users
    name: "查看在线用户"
    description: "显示当前登录用户"
    command: "show users"

  - id: show_tcp_brief
    name: "查看 TCP 连接"
    description: "显示活动 TCP 连接"
    command: "show tcp brief all"

  - id: show_ip_nat_translations
    name: "查看 NAT 转换"
    description: "显示 NAT 转换表"
    command: "show ip nat translations"

  - id: show_ip_nat_statistics
    name: "查看 NAT 统计"
    description: "显示 NAT 统计信息"
    command: "show ip nat statistics"

  - id: show_policy_map_interface
    name: "查看 QoS 策略"
    description: "显示接口 QoS 策略映射"
    command: "show policy-map interface {interface}"
    params:
      - name: interface
        type: string
        description: "接口名称"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  - id: show_ip_cef
    name: "查看 CEF 转发"
    description: "显示 CEF 转发表"
    command: "show ip cef"

# ── Cisco ASA ────────────────────────────────────────────────
cisco_asa:
  - id: show_version
    name: "查看系统版本"
    description: "显示 ASA 版本、运行时间、硬件信息"
    command: "show version"

  - id: show_inventory
    name: "查看硬件清单"
    description: "显示硬件清单和序列号"
    command: "show inventory"

  - id: show_cpu_usage
    name: "查看 CPU 使用"
    description: "显示 CPU 使用率"
    command: "show cpu usage"

  - id: show_memory
    name: "查看内存"
    description: "显示内存使用详情"
    command: "show memory detail"

  - id: show_clock
    name: "查看时间"
    description: "显示系统时间"
    command: "show clock"

  - id: show_interface_ip_brief
    name: "查看接口 IP 摘要"
    description: "显示接口 IP 和状态摘要"
    command: "show interface ip brief"

  - id: show_interface_detail
    name: "查看接口详情"
    description: "显示指定接口详细信息"
    command: "show interface {interface}"
    params:
      - name: interface
        type: string
        description: "接口名称"
        pattern: "^[A-Za-z][A-Za-z0-9/\\-\\.]+$"

  - id: show_xlate
    name: "查看 NAT 转换"
    description: "显示活跃 NAT 转换（xlate）"
    command: "show xlate"

  - id: show_xlate_count
    name: "查看 NAT 转换计数"
    description: "显示 xlate 条目数量"
    command: "show xlate count"

  - id: show_conn
    name: "查看活跃连接"
    description: "显示活跃防火墙连接"
    command: "show conn"

  - id: show_conn_count
    name: "查看连接计数"
    description: "显示活跃连接数量"
    command: "show conn count"

  - id: show_access_list
    name: "查看 ACL"
    description: "显示所有访问控制列表和命中计数"
    command: "show access-list"

  - id: show_nat
    name: "查看 NAT 规则"
    description: "显示 NAT 规则配置"
    command: "show nat"

  - id: show_service_policy
    name: "查看服务策略"
    description: "显示 MPF 服务策略统计"
    command: "show service-policy"

  - id: show_route
    name: "查看路由表"
    description: "显示路由表"
    command: "show route"

  - id: show_ospf_neighbor
    name: "查看 OSPF 邻居"
    description: "显示 OSPF 邻居"
    command: "show ospf neighbor"

  - id: show_arp
    name: "查看 ARP 表"
    description: "显示 ARP 缓存"
    command: "show arp"

  - id: show_failover
    name: "查看 Failover 状态"
    description: "显示 ASA HA failover 状态"
    command: "show failover"

  - id: show_failover_state
    name: "查看 Failover 详细状态"
    description: "显示 failover 详细切换状态"
    command: "show failover state"

  - id: show_vpn_sessiondb
    name: "查看 VPN 会话汇总"
    description: "显示 VPN 会话数据库汇总"
    command: "show vpn-sessiondb"

  - id: show_vpn_sessiondb_anyconnect
    name: "查看 AnyConnect 会话"
    description: "显示 AnyConnect VPN 会话"
    command: "show vpn-sessiondb anyconnect"

  - id: show_crypto_ipsec_sa
    name: "查看 IPSec SA"
    description: "显示 IPSec 安全关联"
    command: "show crypto ipsec sa"

  - id: show_crypto_isakmp_sa
    name: "查看 ISAKMP SA"
    description: "显示 IKE 安全关联"
    command: "show crypto isakmp sa"

  - id: show_crypto_ikev2_sa
    name: "查看 IKEv2 SA"
    description: "显示 IKEv2 安全关联"
    command: "show crypto ikev2 sa"

  - id: show_logging
    name: "查看日志"
    description: "显示日志缓冲区"
    command: "show logging"

  - id: show_running_config
    name: "查看运行配置"
    description: "显示运行配置"
    command: "show running-config"

  - id: ping_ip
    name: "Ping 测试"
    description: "Ping 指定 IP 地址"
    command: "ping {ip_address}"
    params:
      - name: ip_address
        type: ip_address
        description: "目标 IP 地址"

  - id: traceroute_ip
    name: "路由追踪"
    description: "路由追踪到目标 IP"
    command: "traceroute {ip_address}"
    params:
      - name: ip_address
        type: ip_address
        description: "目标 IP 地址"

